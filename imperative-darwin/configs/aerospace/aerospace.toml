# AeroSpace config — XMonad-style keybindings
#
# Modifier: alt (Option key) — analogous to XMonad's mod4 (Super)
# Vim directions: h=left, j=down, k=up, l=right (standard vim)
#
# XMonad mapping reference:
#   mod+j/k           → alt-j/k         focus down/up
#   mod+h/l           → alt-h/l         focus left/right
#   mod+shift+j/k     → alt-shift-j/k   swap down/up
#   mod+shift+return  → alt-shift-enter  spawn terminal
#   mod+shift+c       → alt-shift-c      kill window
#   mod+space         → alt-space        cycle layout
#   mod+shift+space   → alt-shift-space  reset layout
#   mod+t             → alt-t            push to tiling
#   mod+[1-9]         → alt-[1-9]        switch workspace
#   mod+shift+[1-9]   → alt-shift-[1-9]  move to workspace
#   mod+q             → alt-shift-;      enter service mode (reload = r)

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 0
    inner.vertical =   0
    outer.left =       0
    outer.bottom =     0
    outer.top =        0
    outer.right =      0

# ── Main mode ────────────────────────────────────────────────────────
[mode.main.binding]

    # ── Spawn terminal (XMonad: mod+shift+return) ────────────────────
    alt-shift-enter = '''exec-and-forget osascript -e '
    if application "Ghostty" is running then
        tell application "System Events" to keystroke "n" using {command down}
    else
        tell application "Ghostty" to activate
    end if'
    '''

    # ── Kill window (XMonad: mod+shift+c) ────────────────────────────
    alt-shift-c = 'close'

    # ── Focus: vim directions (XMonad: mod+h/j/k/l) ─────────────────
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # ── Move window: vim directions (XMonad: mod+shift+h/j/k/l) ─────
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # ── Layout (XMonad: mod+space = cycle, mod+shift+space = reset) ──
    alt-space = 'layout tiles horizontal vertical'
    alt-shift-space = 'flatten-workspace-tree'

    # ── Toggle floating (XMonad: mod+t = push to tiling) ────────────
    alt-t = 'layout floating tiling'

    # ── Fullscreen (XMonad: noBorders fullscreenFull) ────────────────
    alt-f = 'fullscreen'

    # ── Resize (XMonad: mod+h/l = shrink/expand master) ─────────────
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # ── Workspace switching (XMonad: mod+[1-9]) ─────────────────────
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'

    # ── Named workspaces (AeroSpace extension beyond XMonad's 9) ────
    alt-a = 'workspace A'
    alt-b = 'workspace B'
    alt-c = 'workspace C'
    alt-d = 'workspace D'
    alt-e = 'workspace E'
    alt-g = 'workspace G'
    alt-i = 'workspace I'
    alt-m = 'workspace M'
    alt-n = 'workspace N'
    alt-o = 'workspace O'
    alt-p = 'workspace P'
    alt-q = 'workspace Q'
    alt-r = 'workspace R'
    alt-s = 'workspace S'
    alt-u = 'workspace U'
    alt-v = 'workspace V'
    alt-w = 'workspace W'
    alt-x = 'workspace X'
    alt-y = 'workspace Y'
    alt-z = 'workspace Z'

    # ── Move to workspace (XMonad: mod+shift+[1-9]) ─────────────────
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'

    alt-shift-a = 'move-node-to-workspace A'
    alt-shift-b = 'move-node-to-workspace B'
    alt-shift-d = 'move-node-to-workspace D'
    alt-shift-e = 'move-node-to-workspace E'
    alt-shift-g = 'move-node-to-workspace G'
    alt-shift-i = 'move-node-to-workspace I'
    alt-shift-m = 'move-node-to-workspace M'
    alt-shift-n = 'move-node-to-workspace N'
    alt-shift-o = 'move-node-to-workspace O'
    alt-shift-p = 'move-node-to-workspace P'
    alt-shift-q = 'move-node-to-workspace Q'
    alt-shift-r = 'move-node-to-workspace R'
    alt-shift-s = 'move-node-to-workspace S'
    alt-shift-u = 'move-node-to-workspace U'
    alt-shift-v = 'move-node-to-workspace V'
    alt-shift-w = 'move-node-to-workspace W'
    alt-shift-x = 'move-node-to-workspace X'
    alt-shift-y = 'move-node-to-workspace Y'
    alt-shift-z = 'move-node-to-workspace Z'

    # ── Tab / monitor (XMonad: mod+tab, mod+{w,e,r} for monitors) ───
    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # ── Service mode (XMonad: mod+q = restart) ───────────────────────
    alt-shift-semicolon = 'mode service'

# ── Service mode ─────────────────────────────────────────────────────
# Enter with alt+shift+;, exit with Esc or after any command
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

    down = 'volume down'
    up = 'volume up'
    shift-down = ['volume set 0', 'mode main']
